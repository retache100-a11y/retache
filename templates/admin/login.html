<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — RETACHE</title>
  <style>
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      background:#0F1117; color:#E8E8E6; min-height:100vh;
      display:flex; align-items:center; justify-content:center; }
    .card { background:#1A1D27; border:1px solid #2D3142; border-radius:16px;
      padding:40px; width:100%; max-width:400px; }
    .logo { text-align:center; margin-bottom:28px; }
    .logo-icon { width:52px;height:52px;border-radius:12px;background:#0F6E56;
      display:inline-flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:12px; }
    h1 { font-size:20px; font-weight:700; color:#E8E8E6; margin-bottom:4px; }
    p { font-size:13px; color:#8B8B8B; }
    label { display:block; font-size:12px; color:#8B8B8B; margin-bottom:4px; margin-top:14px; font-weight:500; }
    input { width:100%; padding:10px 12px; border:1px solid #2D3142; border-radius:8px;
      font-size:14px; color:#E8E8E6; background:#0F1117; outline:none; }
    input:focus { border-color:#0F6E56; }
    .btn { width:100%; padding:12px; background:#0F6E56; color:#fff; border:none;
      border-radius:8px; font-size:15px; font-weight:500; cursor:pointer; margin-top:20px; }
    .btn:hover { background:#0D5C47; }
    .error { background:#2D1515; border:1px solid #E24B4A; border-radius:8px;
      padding:10px 14px; font-size:13px; color:#E24B4A; margin-bottom:16px; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🚛</div>
    <h1>Panel de administrador</h1>
    <p>RETACHE — Acceso restringido</p>
  </div>
  {% if error %}
  <div class="error">⚠️ {{ error }}</div>
  {% endif %}
  <form action="/admin/login" method="POST">
    <label>Correo electrónico</label>
    <input type="email" name="email" placeholder="admin@retache.mx" required>
    <label>Contraseña</label>
    <input type="password" name="contrasena" placeholder="••••••••" required>
    <button type="submit" class="btn">Entrar al panel →</button>
  </form>
</div>
</body>
</html>
