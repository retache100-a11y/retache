<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Admin{% endblock %} — RETACHE</title>
  <style>
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      background:#0F1117; color:#E8E8E6; display:flex; min-height:100vh; }
    .sidebar { width:220px; background:#1A1D27; border-right:1px solid #2D3142;
      padding:24px 16px; flex-shrink:0; position:fixed; height:100vh; overflow-y:auto; }
    .sidebar-logo { display:flex; align-items:center; gap:10px; margin-bottom:32px; padding:0 8px; }
    .sidebar-logo-icon { width:32px;height:32px;border-radius:8px;background:#0F6E56;
      display:flex;align-items:center;justify-content:center;font-size:16px; }
    .sidebar-logo span { font-weight:600; font-size:15px; }
    .sidebar-label { font-size:11px; color:#555; text-transform:uppercase;
      letter-spacing:.08em; padding:0 8px; margin-bottom:8px; margin-top:16px; }
    .sidebar a { display:flex; align-items:center; gap:10px; padding:9px 12px;
      border-radius:8px; font-size:14px; color:#8B8B8B; text-decoration:none;
      transition:all .15s; margin-bottom:2px; }
    .sidebar a:hover { background:#2D3142; color:#E8E8E6; }
    .sidebar a.activo { background:#0F6E56; color:#fff; }
    .main { margin-left:220px; padding:32px; flex:1; }
    .page-title { font-size:22px; font-weight:700; margin-bottom:24px; color:#E8E8E6; }
    .stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:12px; margin-bottom:24px; }
    .stat-card { background:#1A1D27; border:1px solid #2D3142; border-radius:12px; padding:16px; }
    .stat-num { font-size:28px; font-weight:700; color:#E8E8E6; }
    .stat-label { font-size:12px; color:#8B8B8B; margin-top:4px; }
    .stat-verde { border-color:#0F6E56; }
    .card { background:#1A1D27; border:1px solid #2D3142; border-radius:12px; padding:20px; margin-bottom:20px; }
    .card-title { font-size:15px; font-weight:600; margin-bottom:16px; color:#E8E8E6; }
    table { width:100%; border-collapse:collapse; font-size:13px; }
    th { text-align:left; padding:10px 12px; color:#8B8B8B; font-weight:500;
      border-bottom:1px solid #2D3142; font-size:12px; text-transform:uppercase; letter-spacing:.04em; }
    td { padding:12px; border-bottom:1px solid #1E2130; color:#C8C8C6; vertical-align:middle; }
    tr:last-child td { border-bottom:none; }
    tr:hover td { background:#1E2130; }
    .badge { display:inline-block; padding:2px 10px; border-radius:20px; font-size:11px; font-weight:500; }
    .badge-verde { background:#0D3D2A; color:#4ADE80; }
    .badge-rojo { background:#3D0D0D; color:#F87171; }
    .badge-amber { background:#3D2E0D; color:#FCD34D; }
    .badge-azul { background:#0D1F3D; color:#60A5FA; }
    .btn { display:inline-flex; align-items:center; padding:6px 14px; border-radius:6px;
      font-size:13px; font-weight:500; cursor:pointer; border:none; text-decoration:none; transition:all .15s; }
    .btn-verde { background:#0F6E56; color:#fff; }
    .btn-verde:hover { background:#0D5C47; }
    .btn-rojo { background:#5C1A1A; color:#F87171; }
    .btn-rojo:hover { background:#7A2020; }
    .btn-gris { background:#2D3142; color:#C8C8C6; }
    .btn-gris:hover { background:#3D4255; }
  </style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-logo">
    <div class="sidebar-logo-icon">🚛</div>
    <span>RETACHE</span>
  </div>

  <div class="sidebar-label">Principal</div>
  <a href="/admin" class="{% if request.url.path == '/admin' %}activo{% endif %}">📊 Dashboard</a>

  <div class="sidebar-label">Usuarios</div>
  <a href="/admin/transportistas" class="{% if 'transportistas' in request.url.path %}activo{% endif %}">🚛 Transportistas</a>
  <a href="/admin/empresas" class="{% if 'empresas' in request.url.path %}activo{% endif %}">🏢 Empresas</a>

  <div class="sidebar-label">Operaciones</div>
  <a href="/admin/cargas" class="{% if 'cargas' in request.url.path %}activo{% endif %}">📦 Cargas</a>

  <div class="sidebar-label">Sistema</div>
  <a href="/" target="_blank">🌐 Ver app</a>
  <a href="/admin/logout" style="color:#F87171;">🚪 Cerrar sesión</a>
</div>

<div class="main">
  {% block content %}{% endblock %}
</div>

</body>
</html>
